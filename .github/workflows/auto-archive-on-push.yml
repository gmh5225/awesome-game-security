name: Auto Archive New Repos on Push

# Pipeline on README.md push to main:
#   1) auto-archive           → archive/{owner}/{repo}.txt
#   2) generate-descriptions  → description/.../description_en.txt
#   3) translate-descriptions → description/.../description_{lang}.txt
#
# No-op pushes (merge / README doc tweak / already-archived URLs):
#   sparse-checkout README only → empty repo list → success, no full tree,
#   generate/translate skipped. Avoids checkout failures on huge merges.
#
# Secret safety:
# - Triggers only on push to main (not pull_request / pull_request_target).
# - Fork PRs never receive this repo's Actions secrets (GitHub platform rule).
# - Forks do not inherit CURSOR_API_KEY; jobs below also refuse to run outside
#   the canonical repo so a forked workflow cannot usefully bind our secret.
on:
  push:
    branches:
      - main
    paths:
      - README.md   # only run when README changes

permissions:
  contents: write

jobs:
  auto-archive:
    if: github.repository == 'gmh5225/awesome-game-security' && github.event.repository.fork == false
    runs-on: ubuntu-latest
    timeout-minutes: 60
    outputs:
      # Downstream generate/translate (needs work of any kind).
      repos: ${{ steps.diff.outputs.repos }}
      # Only repos still missing archive/ (controls full-tree materialize).
      archive_repos: ${{ steps.diff.outputs.archive_repos }}

    steps:
      # Sparse README-only first: merge pushes that barely touch README.md must not
      # materialize the whole archive/description tree (that checkout can fail/time out).
      - name: Checkout (README only)
        uses: actions/checkout@v4
        with:
          # Shallow tip is enough; we fetch `before` by SHA only if missing.
          # (fetch-depth: 0 on this repo is huge and slow for no-op README pushes.)
          fetch-depth: 1
          persist-credentials: true
          sparse-checkout: |
            README.md
          sparse-checkout-cone-mode: false

      - name: Extract newly added GitHub repo URLs
        id: diff
        env:
          # Push range on the remote tip — correct for merge commits too.
          # (HEAD~1..HEAD is first-parent only and misses/misfires on merges.)
          BEFORE_SHA: ${{ github.event.before }}
          AFTER_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          emit_empty() {
            echo "repos=" >> "$GITHUB_OUTPUT"
            echo "archive_repos=" >> "$GITHUB_OUTPUT"
          }

          BEFORE="$BEFORE_SHA"
          AFTER="$AFTER_SHA"
          if [ -z "$BEFORE" ] || [[ "$BEFORE" =~ ^0+$ ]]; then
            # Branch creation / unknown before — deepen once for first parent.
            git fetch --no-tags --deepen=1 origin "${GITHUB_REF_NAME}" || true
            if git rev-parse --verify "${AFTER}^" >/dev/null 2>&1; then
              BEFORE="$(git rev-parse "${AFTER}^")"
            else
              echo "No usable before SHA — nothing to diff."
              emit_empty
              exit 0
            fi
          fi

          if ! git cat-file -e "${BEFORE}^{commit}" 2>/dev/null; then
            echo "Fetching before SHA ${BEFORE} ..."
            if ! git fetch --no-tags --depth=1 origin "$BEFORE"; then
              echo "WARNING: could not fetch before SHA ${BEFORE}; treating as no-op."
              emit_empty
              exit 0
            fi
          fi

          echo "Diffing README.md over ${BEFORE:0:12}..${AFTER:0:12}"

          # Lines added in this push that contain a github.com URL
          mapfile -t RAW < <(
            git diff "$BEFORE" "$AFTER" -- README.md \
              | grep '^+' \
              | grep -v '^+++' \
              | grep -oP 'https://github\.com/\K[^/\s\)\]>\"'\''#]+/[^/\s\)\]>\"'\''#]+' \
              | sed 's/[.,;:]$//' \
              | sort -u \
              | grep -v '^gmh5225/awesome-game-security$' \
              | grep -v '^stars/' \
              || true
          )

          REPOS=()
          ARCHIVE_REPOS=()
          for slug in "${RAW[@]+"${RAW[@]}"}"; do
            [ -z "$slug" ] && continue
            if [[ ! "$slug" =~ ^[A-Za-z0-9._-]+/[A-Za-z0-9._-]+$ ]]; then
              echo "WARNING: skipping invalid slug from README diff: $slug"
              continue
            fi
            owner="${slug%%/*}"
            repo="${slug#*/}"
            # Tip already has archive + EN summary ⇒ merge/re-push noise, skip.
            # (Translations for brand-new repos are handled later in this workflow.)
            has_archive=0
            has_en=0
            git cat-file -e "${AFTER}:archive/${owner}/${repo}.txt" 2>/dev/null && has_archive=1
            git cat-file -e "${AFTER}:description/${owner}/${repo}/description_en.txt" 2>/dev/null && has_en=1
            if [ "$has_archive" = 1 ] && [ "$has_en" = 1 ]; then
              echo "Already archived+described (skip): $slug"
              continue
            fi
            REPOS+=("$slug")
            if [ "$has_archive" != 1 ]; then
              ARCHIVE_REPOS+=("$slug")
            else
              echo "Archive present, EN missing — queue for generate only: $slug"
            fi
          done

          if [ "${#REPOS[@]}" -eq 0 ]; then
            echo "No new GitHub repos needing work in this push (README tweak / merge / already done)."
            emit_empty
          else
            echo "Repos needing generate/translate:"
            printf '%s\n' "${REPOS[@]}"
            REPOS_INLINE=$(printf '%s\n' "${REPOS[@]}" | tr '\n' ' ' | xargs)
            echo "repos=${REPOS_INLINE}" >> "$GITHUB_OUTPUT"
            if [ "${#ARCHIVE_REPOS[@]}" -eq 0 ]; then
              echo "archive_repos=" >> "$GITHUB_OUTPUT"
            else
              echo "Repos needing archive:"
              printf '%s\n' "${ARCHIVE_REPOS[@]}"
              ARCHIVE_INLINE=$(printf '%s\n' "${ARCHIVE_REPOS[@]}" | tr '\n' ' ' | xargs)
              echo "archive_repos=${ARCHIVE_INLINE}" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Skip if nothing to do
        if: steps.diff.outputs.repos == ''
        run: echo "Nothing to archive/generate/translate — skipping full tree and downstream jobs."

      # Only pay the full-checkout cost when archive files still need writing.
      - name: Materialize full tree
        if: steps.diff.outputs.archive_repos != ''
        run: |
          set -euo pipefail
          git sparse-checkout disable
          git checkout --force -- .

      - name: Install code2prompt
        if: steps.diff.outputs.archive_repos != ''
        run: |
          curl -fsSL -o /usr/local/bin/code2prompt \
            https://github.com/mufeedvh/code2prompt/releases/download/v4.2.0/code2prompt-x86_64-unknown-linux-gnu
          chmod +x /usr/local/bin/code2prompt

      - name: Configure git
        if: steps.diff.outputs.archive_repos != ''
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config http.postBuffer    524288000
          git config http.lowSpeedLimit 0
          git config http.lowSpeedTime  999999

      - name: Archive new repos
        if: steps.diff.outputs.archive_repos != ''
        env:
          REPO_SNAPSHOT_HOST: ${{ secrets.REPO_SNAPSHOT_HOST }}
          # Pass via env (not ${{ }} in the script body) to avoid shell injection.
          ARCHIVE_REPOS: ${{ steps.diff.outputs.archive_repos }}
        run: |
          set -euo pipefail
          REPOS=()
          # shellcheck disable=SC2086
          for slug in $ARCHIVE_REPOS; do
            if [[ ! "$slug" =~ ^[A-Za-z0-9._-]+/[A-Za-z0-9._-]+$ ]]; then
              echo "ERROR: invalid repo slug from README diff: $slug"
              exit 1
            fi
            REPOS+=("$slug")
          done
          if [ "${#REPOS[@]}" -eq 0 ]; then
            echo "ERROR: ARCHIVE_REPOS was empty after parsing."
            exit 1
          fi
          python3 scripts/archive-repos.py \
            --workers 3 \
            --commit-every 5 \
            --repos "${REPOS[@]}"

      - name: Final commit (any remainder)
        if: steps.diff.outputs.archive_repos != ''
        run: |
          git add archive/ 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "Nothing left to commit."
            exit 0
          fi

          COUNT=$(git diff --cached --name-only | grep -c "^archive/" || true)
          git commit -m "archive: add ${COUNT} repo prompt(s) [skip ci]"

          PUSHED=0
          for i in 1 2 3 4 5; do
            if git push; then
              echo "Pushed successfully."
              PUSHED=1
              break
            fi
            echo "Push rejected (attempt $i/5), rebasing ..."
            git pull --rebase origin main || { echo "Rebase failed — aborting."; exit 1; }
          done
          if [ "$PUSHED" != 1 ]; then
            echo "Failed to push after 5 attempts."
            exit 1
          fi

  # After archives land on main, summarize each new repo with Cursor CLI.
  generate-descriptions:
    needs: auto-archive
    # Hard gate: canonical repo only + not a fork + archive job found work.
    # Skipped jobs never materialize secrets.* into the runner environment.
    if: >-
      needs.auto-archive.outputs.repos != '' &&
      github.repository == 'gmh5225/awesome-game-security' &&
      github.event.repository.fork == false
    runs-on: ubuntu-latest
    # No job timeout: Cursor Max Mode can run a long time; progress is saved via
    # --commit-every 1. (GitHub-hosted runners still enforce a platform max ~6h.)
    permissions:
      contents: write

    steps:
      - name: Assert canonical repository
        run: |
          set -euo pipefail
          echo "repository=${GITHUB_REPOSITORY}"
          echo "event_name=${GITHUB_EVENT_NAME}"
          echo "ref=${GITHUB_REF}"
          if [ "${GITHUB_REPOSITORY}" != "gmh5225/awesome-game-security" ]; then
            echo "Refusing to run outside canonical repository."
            exit 1
          fi
          if [ "${GITHUB_EVENT_NAME}" != "push" ]; then
            echo "Refusing unexpected event: ${GITHUB_EVENT_NAME}"
            exit 1
          fi
          if [ "${GITHUB_REF}" != "refs/heads/main" ]; then
            echo "Refusing unexpected ref: ${GITHUB_REF}"
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Pick up archive commits pushed by the previous job.
          ref: main
          fetch-depth: 0
          persist-credentials: true

      - name: Ensure latest main (post-archive)
        run: |
          git fetch origin main
          git reset --hard origin/main

      - name: Install Cursor CLI
        run: |
          curl https://cursor.com/install -fsS | bash
          echo "$HOME/.cursor/bin" >> "$GITHUB_PATH"

      - name: Enable Max Mode
        run: |
          mkdir -p "$HOME/.cursor"
          cat > "$HOME/.cursor/cli-config.json" <<'EOF'
          {
            "version": 1,
            "editor": { "vimMode": false },
            "permissions": { "allow": [], "deny": [] },
            "maxMode": true,
            "approvalMode": "unrestricted",
            "attribution": {
              "attributeCommitsToAgent": false,
              "attributePRsToAgent": false
            }
          }
          EOF
          echo "CURSOR_CONFIG_DIR=$HOME/.cursor" >> "$GITHUB_ENV"

      - name: Configure git
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Generate descriptions via Cursor CLI
        id: generate
        continue-on-error: true
        env:
          # Injected only into this step on the canonical non-fork job above.
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          # Env-based handoff avoids shell metacharacter injection from README URLs.
          DESC_REPOS: ${{ needs.auto-archive.outputs.repos }}
          GIT_PUSH_BRANCH: main
        run: |
          set -euo pipefail
          if [ "${GITHUB_REPOSITORY}" != "gmh5225/awesome-game-security" ]; then
            echo "Refusing to use CURSOR_API_KEY outside canonical repository."
            exit 1
          fi
          if [ -z "${CURSOR_API_KEY:-}" ]; then
            echo "ERROR: CURSOR_API_KEY secret is not set."
            echo "Add it under Settings → Secrets and variables → Actions."
            exit 1
          fi

          agent --version || true

          python3 scripts/generate-descriptions-cli.py \
            --model cursor-grok-4.5-high-fast \
            --commit-every 1 \
            --repos-env DESC_REPOS

      - name: Final commit (any remainder)
        run: |
          set -euo pipefail
          # Per-repo commits already ran inside the script; this catches leftovers.
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            git checkout -- "$f" 2>/dev/null || rm -rf -- "$f"
          done < <(
            git ls-files -m -o --exclude-standard \
              | grep -v -E '^description/[^/]+/[^/]+/description_en\.txt$' \
              || true
          )

          git add -- ':(glob)description/**/description_en.txt' 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No description files left to commit."
          else
            COUNT=$(git diff --cached --name-only | grep -c "description_en.txt" || true)
            git commit -m "description: add ${COUNT} summary(ies) via Cursor CLI [skip ci]"

            PUSHED=0
            for i in 1 2 3 4 5; do
              if git push; then
                echo "Pushed successfully."
                PUSHED=1
                break
              fi
              echo "Push rejected (attempt $i/5), rebasing ..."
              git pull --rebase origin main || { echo "Rebase failed — aborting."; exit 1; }
            done
            if [ "$PUSHED" != 1 ]; then
              echo "Failed to push after 5 attempts."
              exit 1
            fi
          fi

          if [ "${{ steps.generate.outcome }}" = "failure" ]; then
            echo "Generation had failures — see the Generate step logs."
            exit 1
          fi

  # After English summaries land on main, translate to zh-CN / zh-TW / ja / …
  # Must be the same workflow: generate commits use [skip ci], so a separate
  # push-triggered translate workflow would never start.
  translate-descriptions:
    needs: [auto-archive, generate-descriptions]
    if: >-
      always() &&
      needs.auto-archive.result == 'success' &&
      needs.auto-archive.outputs.repos != '' &&
      (needs.generate-descriptions.result == 'success' ||
       needs.generate-descriptions.result == 'failure') &&
      github.repository == 'gmh5225/awesome-game-security' &&
      github.event.repository.fork == false
    runs-on: ubuntu-latest
    # No job timeout: Cursor Max Mode can run a long time; progress is saved via
    # --commit-every 1. (GitHub-hosted runners still enforce a platform max ~6h.)
    permissions:
      contents: write

    steps:
      - name: Assert canonical repository
        run: |
          set -euo pipefail
          echo "repository=${GITHUB_REPOSITORY}"
          echo "event_name=${GITHUB_EVENT_NAME}"
          echo "ref=${GITHUB_REF}"
          if [ "${GITHUB_REPOSITORY}" != "gmh5225/awesome-game-security" ]; then
            echo "Refusing to run outside canonical repository."
            exit 1
          fi
          if [ "${GITHUB_EVENT_NAME}" != "push" ]; then
            echo "Refusing unexpected event: ${GITHUB_EVENT_NAME}"
            exit 1
          fi
          if [ "${GITHUB_REF}" != "refs/heads/main" ]; then
            echo "Refusing unexpected ref: ${GITHUB_REF}"
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Pick up description_en commits pushed by the previous job.
          ref: main
          fetch-depth: 0
          persist-credentials: true

      - name: Ensure latest main (post-generate)
        run: |
          git fetch origin main
          git reset --hard origin/main

      - name: Install Cursor CLI
        run: |
          curl https://cursor.com/install -fsS | bash
          echo "$HOME/.cursor/bin" >> "$GITHUB_PATH"

      - name: Enable Max Mode
        run: |
          mkdir -p "$HOME/.cursor"
          cat > "$HOME/.cursor/cli-config.json" <<'EOF'
          {
            "version": 1,
            "editor": { "vimMode": false },
            "permissions": { "allow": [], "deny": [] },
            "maxMode": true,
            "approvalMode": "unrestricted",
            "attribution": {
              "attributeCommitsToAgent": false,
              "attributePRsToAgent": false
            }
          }
          EOF
          echo "CURSOR_CONFIG_DIR=$HOME/.cursor" >> "$GITHUB_ENV"

      - name: Configure git
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Translate descriptions via Cursor CLI
        id: translate
        continue-on-error: true
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          DESC_REPOS: ${{ needs.auto-archive.outputs.repos }}
          GIT_PUSH_BRANCH: main
        run: |
          set -euo pipefail
          if [ "${GITHUB_REPOSITORY}" != "gmh5225/awesome-game-security" ]; then
            echo "Refusing to use CURSOR_API_KEY outside canonical repository."
            exit 1
          fi
          if [ -z "${CURSOR_API_KEY:-}" ]; then
            echo "ERROR: CURSOR_API_KEY secret is not set."
            echo "Add it under Settings → Secrets and variables → Actions."
            exit 1
          fi

          agent --version || true

          # Fill missing langs for the repos just archived/summarized.
          python3 scripts/translate-descriptions-cli.py \
            --model cursor-grok-4.5-high-fast \
            --commit-every 1 \
            --repos-env DESC_REPOS

      - name: Final commit (any remainder)
        run: |
          set -euo pipefail
          KEEP_RE='^description/[^/]+/[^/]+/description_(zh-CN|zh-TW|ja|ko|fr|de|es|it|ru)\.txt$'
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            git checkout -- "$f" 2>/dev/null || rm -rf -- "$f"
          done < <(
            git ls-files -m -o --exclude-standard \
              | grep -v -E "$KEEP_RE" \
              || true
          )

          git add -- \
            ':(glob)description/**/description_zh-CN.txt' \
            ':(glob)description/**/description_zh-TW.txt' \
            ':(glob)description/**/description_ja.txt' \
            ':(glob)description/**/description_ko.txt' \
            ':(glob)description/**/description_fr.txt' \
            ':(glob)description/**/description_de.txt' \
            ':(glob)description/**/description_es.txt' \
            ':(glob)description/**/description_it.txt' \
            ':(glob)description/**/description_ru.txt' \
            2>/dev/null || true

          if git diff --cached --quiet; then
            echo "No translation files left to commit."
          else
            COUNT=$(git diff --cached --name-only | grep -c 'description_' || true)
            git commit -m "description: translate ${COUNT} file(s) via Cursor CLI [skip ci]"

            PUSHED=0
            for i in 1 2 3 4 5; do
              if git push; then
                echo "Pushed successfully."
                PUSHED=1
                break
              fi
              echo "Push rejected (attempt $i/5), rebasing ..."
              git pull --rebase origin main || { echo "Rebase failed — aborting."; exit 1; }
            done
            if [ "$PUSHED" != 1 ]; then
              echo "Failed to push after 5 attempts."
              exit 1
            fi
          fi

          if [ "${{ steps.translate.outcome }}" = "failure" ]; then
            echo "Translation had failures — see the Translate step logs."
            exit 1
          fi
