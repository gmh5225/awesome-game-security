name: Discover Repos (Cursor CLI)

# Scan GitHub for theme-related repos using README headings, then run TWO
# Cursor CLI passes (relevance screen → confirm + placement). Validated
# approvals are committed directly to main via the Contents API.
#
# After a successful Contents-API commit, this workflow explicitly dispatches
# Auto Archive New Repos on Push (archive → EN description → translate).
# That handoff is required because GITHUB_TOKEN commits do not trigger push
# workflows (GitHub recursion guard); PR merges still use the normal push path.
#
# Triggers:
# - schedule: every 3 hours
# - workflow_dispatch: tunable lookback / limits / model / queries
#
# Secret safety:
# - Canonical repo only; forks never inherit CURSOR_API_KEY.
# - No pull_request / pull_request_target.

on:
  schedule:
    # Every 3 hours at minute 0 UTC (00:00, 03:00, 06:00, ...)
    - cron: "0 */3 * * *"

  workflow_dispatch:
    inputs:
      lookback_days:
        description: "Only repos pushed within this many days"
        required: false
        default: "1"
      max_candidates:
        description: "Max candidates after merge/dedupe"
        required: false
        default: "30"
      min_stars:
        description: "Minimum stars filter"
        required: false
        default: "3"
      max_queries:
        description: "Cap README-derived search queries (0 = no cap)"
        required: false
        default: "300"
      model:
        description: "Cursor CLI model id"
        required: false
        default: "cursor-grok-4.5-high-fast"
      queries:
        description: "Optional extra queries appended to README headings (newline or ||; empty = README-only)"
        required: false
        default: ""

concurrency:
  group: discover-repos
  # Queue overlaps — cron must not kill an in-progress manual run.
  cancel-in-progress: false

jobs:
  discover:
    if: github.repository == 'gmh5225/awesome-game-security' && github.event.repository.fork == false
    runs-on: ubuntu-latest
    permissions:
      contents: write
      # Needed to gh-workflow-run auto-archive after Contents API commit.
      actions: write

    steps:
      - name: Assert canonical repository
        run: |
          set -euo pipefail
          echo "repository=${GITHUB_REPOSITORY}"
          echo "event_name=${GITHUB_EVENT_NAME}"
          echo "actor=${GITHUB_ACTOR}"
          if [ "${GITHUB_REPOSITORY}" != "gmh5225/awesome-game-security" ]; then
            echo "Refusing to run outside canonical repository."
            exit 1
          fi
          case "${GITHUB_EVENT_NAME}" in
            schedule|workflow_dispatch) ;;
            *)
              echo "Refusing unexpected event: ${GITHUB_EVENT_NAME}"
              exit 1
              ;;
          esac

      # Shallow + sparse: this repo is multi-GB (archive/). Discover only needs
      # README + scripts + skills. Commits use Contents API (no git push).
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: true
          # Non-cone patterns so root README.md is included (cone mode is dirs-only).
          sparse-checkout-cone-mode: false
          sparse-checkout: |
            /README.md
            /scripts/
            /.claude/
            /.github/

      - name: Resolve inputs
        id: opts
        run: |
          set -euo pipefail
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            LOOKBACK="${{ inputs.lookback_days }}"
            MAX_CAND="${{ inputs.max_candidates }}"
            MIN_STARS="${{ inputs.min_stars }}"
            MAX_QUERIES="${{ inputs.max_queries }}"
            MODEL="${{ inputs.model }}"
            QUERIES="${{ inputs.queries }}"
          else
            # Scheduled cadence: short lookback is enough.
            LOOKBACK="1"
            MAX_CAND="30"
            MIN_STARS="3"
            MAX_QUERIES="300"
            MODEL="cursor-grok-4.5-high-fast"
            QUERIES=""
          fi

          for name in LOOKBACK MAX_CAND MIN_STARS MAX_QUERIES; do
            val="${!name}"
            if ! [[ "${val}" =~ ^[0-9]+$ ]]; then
              echo "ERROR: ${name} must be an integer, got: ${val}"
              exit 1
            fi
          done

          {
            echo "lookback_days=${LOOKBACK}"
            echo "max_candidates=${MAX_CAND}"
            echo "min_stars=${MIN_STARS}"
            echo "max_queries=${MAX_QUERIES}"
            echo "model<<EOF"
            printf '%s\n' "${MODEL}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          {
            echo "DISCOVER_QUERIES<<EOF"
            printf '%s\n' "${QUERIES}"
            echo "EOF"
          } >> "$GITHUB_ENV"

          echo "lookback_days=${LOOKBACK}"
          echo "max_candidates=${MAX_CAND}"
          echo "min_stars=${MIN_STARS}"
          echo "max_queries=${MAX_QUERIES}"
          echo "model=${MODEL}"

      - name: Install Cursor CLI
        run: |
          curl https://cursor.com/install -fsS | bash
          echo "$HOME/.cursor/bin" >> "$GITHUB_PATH"

      - name: Enable Max Mode
        run: |
          mkdir -p "$HOME/.cursor"
          cat > "$HOME/.cursor/cli-config.json" <<'EOF'
          {
            "version": 1,
            "editor": { "vimMode": false },
            "permissions": { "allow": [], "deny": [] },
            "maxMode": true,
            "approvalMode": "unrestricted",
            "attribution": {
              "attributeCommitsToAgent": false,
              "attributePRsToAgent": false
            }
          }
          EOF
          echo "CURSOR_CONFIG_DIR=$HOME/.cursor" >> "$GITHUB_ENV"

      - name: Configure git
        run: |
          # Identity for local working-tree ops; remote commits use Contents API.
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Discover + 2-pass review + commit to main
        id: discover
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          GH_TOKEN: ${{ github.token }}
          PYTHONUNBUFFERED: "1"
          LOOKBACK: ${{ steps.opts.outputs.lookback_days }}
          MAX_CAND: ${{ steps.opts.outputs.max_candidates }}
          MIN_STARS: ${{ steps.opts.outputs.min_stars }}
          MAX_QUERIES: ${{ steps.opts.outputs.max_queries }}
          DESC_MODEL: ${{ steps.opts.outputs.model }}
        run: |
          set -euo pipefail
          if [ "${GITHUB_REPOSITORY}" != "gmh5225/awesome-game-security" ]; then
            echo "Refusing to use CURSOR_API_KEY outside canonical repository."
            exit 1
          fi
          if [ -z "${CURSOR_API_KEY:-}" ]; then
            echo "ERROR: CURSOR_API_KEY secret is not set."
            echo "Add it under Settings → Secrets and variables → Actions."
            exit 1
          fi

          agent --version || true
          gh --version || true

          ARGS=(
            --lookback-days "$LOOKBACK"
            --max-candidates "$MAX_CAND"
            --min-stars "$MIN_STARS"
            --max-queries "$MAX_QUERIES"
            --model "$DESC_MODEL"
            --commit
            --run-id "${GITHUB_RUN_ID}"
          )

          if [ -n "${DISCOVER_QUERIES//[[:space:]]/}" ]; then
            ARGS+=(--queries-env DISCOVER_QUERIES)
          fi

          LOG=/tmp/discover-repos.log
          python3 scripts/discover-repos-cli.py "${ARGS[@]}" | tee "$LOG"

          commit_sha="$(grep -E '^COMMIT_SHA=' "$LOG" | tail -n1 | cut -d= -f2- || true)"
          approved="$(grep -E '^Final: approved=' "$LOG" | tail -n1 | sed -E 's/^Final: approved=([0-9]+).*/\1/' || true)"
          {
            echo "commit_sha=${commit_sha}"
            echo "approved_count=${approved:-0}"
            echo "approved_repos<<EOF"
            grep -E '^APPROVED_REPO=' "$LOG" | sed 's/^APPROVED_REPO=//' || true
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      # GITHUB_TOKEN Contents-API commits do not fire push workflows. Handoff
      # archive → describe → translate via workflow_dispatch (allowed exception).
      - name: Trigger archive + describe + translate
        if: success() && steps.discover.outputs.commit_sha != ''
        env:
          GH_TOKEN: ${{ github.token }}
          COMMIT_SHA: ${{ steps.discover.outputs.commit_sha }}
          APPROVED_REPOS: ${{ steps.discover.outputs.approved_repos }}
        run: |
          set -euo pipefail
          REPOS=()
          while IFS= read -r line; do
            line="$(printf '%s' "$line" | tr -d '\r' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"
            [ -z "$line" ] && continue
            slug="${line%%|*}"
            if [[ ! "$slug" =~ ^[A-Za-z0-9._-]+/[A-Za-z0-9._-]+$ ]]; then
              echo "WARNING: skipping invalid approved slug: $slug"
              continue
            fi
            REPOS+=("$slug")
          done <<< "${APPROVED_REPOS}"

          if [ "${#REPOS[@]}" -eq 0 ]; then
            echo "Commit exists but no parseable APPROVED_REPO lines — not dispatching."
            exit 0
          fi

          REPOS_INLINE=$(printf '%s ' "${REPOS[@]}" | xargs)
          echo "Dispatching auto-archive-on-push.yml"
          echo "  after_sha=${COMMIT_SHA}"
          echo "  repos=${REPOS_INLINE}"

          gh workflow run auto-archive-on-push.yml \
            --repo "${GITHUB_REPOSITORY}" \
            --ref main \
            -f "repos=${REPOS_INLINE}" \
            -f "after_sha=${COMMIT_SHA}"

          echo "Dispatched Auto Archive pipeline for ${#REPOS[@]} repo(s)."

      - name: Notify Discord
        if: success()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          COMMIT_SHA: ${{ steps.discover.outputs.commit_sha }}
          APPROVED_COUNT: ${{ steps.discover.outputs.approved_count }}
          APPROVED_REPOS: ${{ steps.discover.outputs.approved_repos }}
        run: |
          set -euo pipefail
          if [ -z "${DISCORD_WEBHOOK_URL:-}" ]; then
            echo "DISCORD_WEBHOOK_URL secret not set — skipping Discord notify."
            exit 0
          fi

          # Discord/Cloudflare rejects Python-urllib's default User-Agent (403).
          # flags=4 (SUPPRESS_EMBEDS) + <url> wrap: no link thumbnails.
          python3 - <<'PY'
          import json, os, urllib.request

          commit_sha = (os.environ.get("COMMIT_SHA") or "").strip()
          approved_count = (os.environ.get("APPROVED_COUNT") or "0").strip()
          approved_repos = os.environ.get("APPROVED_REPOS") or ""
          run_url = (
              f"{os.environ['GITHUB_SERVER_URL']}/"
              f"{os.environ['GITHUB_REPOSITORY']}/actions/runs/"
              f"{os.environ['GITHUB_RUN_ID']}"
          )

          def no_embed(url: str) -> str:
              return f"<{url}>"

          lines: list[str] = []
          if commit_sha:
              commit_url = (
                  f"{os.environ['GITHUB_SERVER_URL']}/"
                  f"{os.environ['GITHUB_REPOSITORY']}/commit/{commit_sha}"
              )
              lines.append(
                  f"✅ **Discover Repos** — added **{approved_count or '?'}** repo(s)"
              )
              for raw in approved_repos.splitlines():
                  raw = raw.strip()
                  if not raw:
                      continue
                  parts = raw.split("|", 2)
                  slug = parts[0] if parts else ""
                  url = parts[1] if len(parts) > 1 else ""
                  section = parts[2] if len(parts) > 2 else ""
                  item = f"- `{slug}`" if slug else "- (unknown)"
                  if url:
                      item += f" `{url}`"
                  if section:
                      item += f" → {section}"
                  lines.append(item)
              if not any(line.startswith("- ") for line in lines):
                  lines.append(f"- (details missing; count={approved_count})")
              lines.append(f"commit: `{commit_sha[:12]}` {no_embed(commit_url)}")
          else:
              lines.append(
                  f"ℹ️ **Discover Repos** finished — no README commit "
                  f"(approved: {approved_count or '0'})"
              )
          lines.append(f"run: {no_embed(run_url)}")

          content = "\n".join(lines)
          if len(content) > 1900:
              content = content[:1900] + "\n…"

          body = json.dumps(
              {
                  "content": content,
                  "flags": 4,  # SUPPRESS_EMBEDS
              }
          ).encode()
          req = urllib.request.Request(
              os.environ["DISCORD_WEBHOOK_URL"],
              data=body,
              headers={
                  "Content-Type": "application/json",
                  "User-Agent": "awesome-game-security-ci (GitHub Actions)",
              },
              method="POST",
          )
          with urllib.request.urlopen(req, timeout=30) as resp:
              print(f"Discord webhook status={resp.status}")
          PY