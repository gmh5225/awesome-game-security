name: Fill Missing Descriptions (Cursor CLI)

# Scan archive/ for repos that lack description_en.txt, then summarize them
# with Cursor CLI (cursor-grok-4.5-high-fast, max mode).
# New README entries are still handled automatically by auto-archive-on-push.yml;
# this workflow is the backfill / catch-up path.
#
# Triggers:
# - schedule: every 3 hours (offset :30 from discover at :00)
# - workflow_dispatch: optional repos / limit / model
#
# Secret safety:
# - Canonical repo only; forks never inherit CURSOR_API_KEY.
# - No pull_request / pull_request_target.

on:
  schedule:
    # Every 3 hours at minute 30 UTC — stagger from discover (`0 */3 * * *`).
    - cron: "30 */3 * * *"

  workflow_dispatch:
    inputs:
      limit:
        description: "Max missing repos to process (0 = all missing)"
        required: false
        default: "0"
      repos:
        description: "Optional space-separated owner/repo list (empty = scan all missing)"
        required: false
        default: ""
      model:
        description: "Cursor CLI model id"
        required: false
        default: "cursor-grok-4.5-high-fast"

concurrency:
  # Queue overlaps instead of cancelling — cron must not kill a manual run.
  group: fill-missing-descriptions
  cancel-in-progress: false

jobs:
  fill-missing:
    # Refuse on forks / renamed mirrors — skipped jobs do not receive secrets.
    if: github.repository == 'gmh5225/awesome-game-security' && github.event.repository.fork == false
    runs-on: ubuntu-latest
    # No job timeout: agent runs unbounded; --commit-every 1 persists each repo.
    # (GitHub-hosted runners still enforce a platform max ~6h.)
    permissions:
      contents: write

    steps:
      - name: Assert canonical repository
        run: |
          set -euo pipefail
          echo "repository=${GITHUB_REPOSITORY}"
          echo "event_name=${GITHUB_EVENT_NAME}"
          echo "actor=${GITHUB_ACTOR}"
          if [ "${GITHUB_REPOSITORY}" != "gmh5225/awesome-game-security" ]; then
            echo "Refusing to run outside canonical repository."
            exit 1
          fi
          case "${GITHUB_EVENT_NAME}" in
            schedule|workflow_dispatch) ;;
            *)
              echo "Refusing unexpected event: ${GITHUB_EVENT_NAME}"
              exit 1
              ;;
          esac

      - name: Resolve inputs
        id: opts
        env:
          # github.event.inputs is empty on schedule (safe); inputs context is not.
          INPUT_LIMIT: ${{ github.event.inputs.limit }}
          INPUT_REPOS: ${{ github.event.inputs.repos }}
          INPUT_MODEL: ${{ github.event.inputs.model }}
        run: |
          set -euo pipefail
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            LIMIT="${INPUT_LIMIT:-0}"
            REPOS="${INPUT_REPOS:-}"
            MODEL="${INPUT_MODEL:-cursor-grok-4.5-high-fast}"
          else
            # Scheduled catch-up: cap batch size so sparse archive extract stays small.
            LIMIT="20"
            REPOS=""
            MODEL="cursor-grok-4.5-high-fast"
          fi
          if ! [[ "${LIMIT}" =~ ^[0-9]+$ ]]; then
            echo "ERROR: limit must be an integer, got: ${LIMIT}"
            exit 1
          fi
          {
            echo "limit=${LIMIT}"
            echo "model<<EOF"
            printf '%s\n' "${MODEL}"
            echo "EOF"
            echo "repos<<EOF"
            printf '%s\n' "${REPOS}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          echo "limit=${LIMIT}"
          echo "model=${MODEL}"
          echo "repos=${REPOS:-"(scan missing)"}"

      # Full checkout of archive/ is multi-GB and OOMs Cursor with disk-full.
      - name: Checkout (sparse)
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: true
          sparse-checkout-cone-mode: false
          sparse-checkout: |
            /scripts/
            /description/
            /.github/

      - name: Scan / select repos needing descriptions
        id: scan
        env:
          LIMIT: ${{ steps.opts.outputs.limit }}
          REPOS_INPUT: ${{ steps.opts.outputs.repos }}
        run: |
          set -euo pipefail
          REPOS_INPUT="${REPOS_INPUT:-}"
          : > /tmp/work-repos.txt

          if [ -n "${REPOS_INPUT//[[:space:]]/}" ]; then
            # shellcheck disable=SC2086
            for slug in $REPOS_INPUT; do
              if [[ ! "$slug" =~ ^[A-Za-z0-9._-]+/[A-Za-z0-9._-]+$ ]]; then
                echo "ERROR: invalid repo slug: $slug"
                exit 1
              fi
              echo "$slug" >> /tmp/work-repos.txt
            done
          else
            # List archive blobs via git (no full tree materialize).
            while IFS= read -r path; do
              [ -z "$path" ] && continue
              owner="$(printf '%s' "$path" | cut -d/ -f2)"
              repo="$(printf '%s' "$path" | cut -d/ -f3 | sed 's/\.txt$//')"
              if [[ ! "${owner}/${repo}" =~ ^[A-Za-z0-9._-]+/[A-Za-z0-9._-]+$ ]]; then
                continue
              fi
              if git cat-file -e "HEAD:description/${owner}/${repo}/description_en.txt" 2>/dev/null; then
                continue
              fi
              echo "${owner}/${repo}" >> /tmp/work-repos.txt
            done < <(
              git ls-tree -r --name-only HEAD -- archive/ \
                | grep -E '^archive/[^/]+/[^/]+\.txt$' \
                || true
            )
          fi

          MISSING=$(grep -c . /tmp/work-repos.txt || true)
          echo "Found ${MISSING} repo(s) in work list (pre-limit)"

          if [ "${LIMIT}" != "0" ] && [ "${MISSING}" -gt "${LIMIT}" ]; then
            head -n "${LIMIT}" /tmp/work-repos.txt > /tmp/work-repos.limited.txt
            mv /tmp/work-repos.limited.txt /tmp/work-repos.txt
            MISSING=$(grep -c . /tmp/work-repos.txt || true)
            echo "Limited to ${MISSING} repo(s)"
          fi

          REPOS_INLINE="$(tr '\n' ' ' < /tmp/work-repos.txt | xargs)"
          {
            echo "missing_count=${MISSING}"
            echo "repos<<EOF"
            printf '%s\n' "${REPOS_INLINE}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          echo "Work list (${MISSING}): ${REPOS_INLINE}"

      - name: Skip if nothing missing
        if: steps.scan.outputs.missing_count == '0'
        run: echo "Nothing to describe — done."

      - name: Materialize target archive files only
        if: steps.scan.outputs.missing_count != '0'
        env:
          DESC_REPOS: ${{ steps.scan.outputs.repos }}
        run: |
          set -euo pipefail
          for slug in $DESC_REPOS; do
            if [[ ! "$slug" =~ ^[A-Za-z0-9._-]+/[A-Za-z0-9._-]+$ ]]; then
              echo "ERROR: invalid repo slug: $slug"
              exit 1
            fi
            owner="${slug%%/*}"
            repo="${slug#*/}"
            path="archive/${owner}/${repo}.txt"
            git sparse-checkout add "/${path}"
            git checkout HEAD -- "${path}"
            ls -lh "${path}"
          done
          df -h .
          du -sh scripts description archive 2>/dev/null || true

      - name: Install Cursor CLI
        if: steps.scan.outputs.missing_count != '0'
        run: |
          curl https://cursor.com/install -fsS | bash
          echo "$HOME/.cursor/bin" >> "$GITHUB_PATH"

      - name: Enable Max Mode
        if: steps.scan.outputs.missing_count != '0'
        run: |
          mkdir -p "$HOME/.cursor"
          cat > "$HOME/.cursor/cli-config.json" <<'EOF'
          {
            "version": 1,
            "editor": { "vimMode": false },
            "permissions": { "allow": [], "deny": [] },
            "maxMode": true,
            "approvalMode": "unrestricted",
            "attribution": {
              "attributeCommitsToAgent": false,
              "attributePRsToAgent": false
            }
          }
          EOF
          echo "CURSOR_CONFIG_DIR=$HOME/.cursor" >> "$GITHUB_ENV"
          rm -rf "$HOME/.cursor/projects" "$HOME/.cursor/chats" \
                 "$HOME/.cursor/ai-tracking" "$HOME/.cursor/agent-transcripts" \
                 /tmp/cursor* 2>/dev/null || true
          echo "TMPDIR=${RUNNER_TEMP:-/tmp}" >> "$GITHUB_ENV"
          df -h

      - name: Configure git
        if: steps.scan.outputs.missing_count != '0'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fill missing descriptions via Cursor CLI
        id: generate
        if: steps.scan.outputs.missing_count != '0'
        continue-on-error: true
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          DESC_REPOS: ${{ steps.scan.outputs.repos }}
          DESC_MODEL: ${{ steps.opts.outputs.model }}
          GIT_PUSH_BRANCH: main
        run: |
          set -euo pipefail
          if [ "${GITHUB_REPOSITORY}" != "gmh5225/awesome-game-security" ]; then
            echo "Refusing to use CURSOR_API_KEY outside canonical repository."
            exit 1
          fi
          if [ -z "${CURSOR_API_KEY:-}" ]; then
            echo "ERROR: CURSOR_API_KEY secret is not set."
            echo "Add it under Settings → Secrets and variables → Actions."
            exit 1
          fi

          agent --version || true
          df -h

          python3 scripts/generate-descriptions-cli.py \
            --model "$DESC_MODEL" \
            --commit-every 1 \
            --repos-env DESC_REPOS

      - name: Final commit (any remainder)
        if: steps.scan.outputs.missing_count != '0'
        run: |
          set -euo pipefail
          # Per-repo commits already ran inside the script; this catches leftovers.
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            git checkout -- "$f" 2>/dev/null || rm -rf -- "$f"
          done < <(
            git ls-files -m -o --exclude-standard \
              | grep -v -E '^description/[^/]+/[^/]+/description_en\.txt$' \
              || true
          )

          git add -- ':(glob)description/**/description_en.txt' 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No description files left to commit."
          else
            COUNT=$(git diff --cached --name-only | grep -c "description_en.txt" || true)
            git commit -m "description: fill ${COUNT} missing summary(ies) via Cursor CLI [skip ci]"

            # Concurrent archive/fill jobs often add the same description_en.txt.
            # On non-ff reject: undo commit, sync to origin/main, skip files
            # already upstream, recommit only what is still missing.
            PUSHED=0
            for i in 1 2 3 4 5; do
              if git push origin HEAD:main; then
                echo "Pushed successfully."
                PUSHED=1
                break
              fi
              echo "Push rejected (attempt $i/5), syncing with origin/main ..."
              mapfile -t PENDING < <(git show --name-only --pretty='' HEAD | grep -E '^description/[^/]+/[^/]+/description_en\.txt$' || true)
              TMPDIR_SYNC=$(mktemp -d)
              for f in "${PENDING[@]+"${PENDING[@]}"}"; do
                [ -f "$f" ] || continue
                mkdir -p "$TMPDIR_SYNC/$(dirname "$f")"
                cp -f "$f" "$TMPDIR_SYNC/$f"
              done
              git rebase --abort 2>/dev/null || true
              git reset --mixed HEAD~1
              for f in "${PENDING[@]+"${PENDING[@]}"}"; do
                rm -f -- "$f"
              done
              git fetch origin main
              git merge --ff-only origin/main || git reset --hard origin/main

              STILL=()
              for f in "${PENDING[@]+"${PENDING[@]}"}"; do
                if git cat-file -e "origin/main:$f" 2>/dev/null \
                  && [ -n "$(git show "origin/main:$f" 2>/dev/null | tr -d '[:space:]')" ]; then
                  echo "Already on origin/main, skipping $f"
                  continue
                fi
                if [ -f "$TMPDIR_SYNC/$f" ] && [ -s "$TMPDIR_SYNC/$f" ]; then
                  mkdir -p "$(dirname "$f")"
                  cp -f "$TMPDIR_SYNC/$f" "$f"
                  STILL+=("$f")
                fi
              done
              rm -rf "$TMPDIR_SYNC"

              if [ "${#STILL[@]}" -eq 0 ]; then
                echo "Remote already has all leftover description files — ok."
                PUSHED=1
                break
              fi
              git add -- "${STILL[@]}"
              COUNT=${#STILL[@]}
              git commit -m "description: fill ${COUNT} missing summary(ies) via Cursor CLI [skip ci]"
            done
            if [ "$PUSHED" != 1 ]; then
              echo "Failed to push after 5 attempts."
              exit 1
            fi
          fi

          # Per-repo successes were already committed+pushed inside the script.
          if [ "${{ steps.generate.outcome }}" = "failure" ]; then
            echo "::warning::Partial failure: some repos did not get descriptions. Successful ones are already on main; see the Fill step logs."
            exit 1
          fi
